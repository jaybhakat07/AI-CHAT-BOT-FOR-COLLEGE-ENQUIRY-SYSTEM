<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - College Enquiry Bot</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:3rem">🎓</div>
      <h1>Create Account</h1>
      <p>Join College Enquiry Bot today</p>
    </div>

    <div id="alert-container"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="full_name">Full Name</label>
        <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="phone">Phone Number <span style="color:var(--gray-500)">(optional)</span></label>
        <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" class="form-control" placeholder="Repeat your password" required>
      </div>
      <button type="submit" id="register-btn" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
    <div class="auth-footer" style="margin-top:0.5rem">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
