<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - College Enquiry Bot</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="auth-container" style="background:linear-gradient(135deg,#1e293b 0%,#334155 100%)">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:3rem">🔐</div>
      <h1>Admin Portal</h1>
      <p>College Enquiry Bot Administration</p>
    </div>

    <div id="alert-container"></div>

    <form id="admin-login-form">
      <div class="form-group">
        <label class="form-label" for="email">Admin Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@college.edu" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter admin password" required>
      </div>
      <button type="submit" id="admin-login-btn" class="btn btn-primary btn-block btn-lg" style="background:var(--dark);border:none">
        Access Admin Panel
      </button>
    </form>

    <div class="auth-footer">
      <a href="index.html">← Back to Main Site</a>
    </div>
    <div class="auth-footer" style="margin-top:0.75rem;background:var(--gray-100);padding:0.75rem;border-radius:var(--radius);font-size:0.8rem">
      <strong>Default credentials:</strong><br>
      Email: admin@college.edu<br>
      Password: admin123
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
