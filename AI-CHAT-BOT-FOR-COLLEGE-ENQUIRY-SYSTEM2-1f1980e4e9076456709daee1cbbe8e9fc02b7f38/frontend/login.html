<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - College Enquiry Bot</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:3rem">🎓</div>
      <h1>Welcome Back</h1>
      <p>Login to continue to College Enquiry Bot</p>
    </div>

    <div id="alert-container"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg">Login</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
    <div class="auth-footer" style="margin-top:0.5rem">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
